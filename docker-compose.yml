services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sms
      POSTGRES_PASSWORD: sms
      POSTGRES_DB: sms_delivery
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  sms-delivery:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://sms:sms@db:5432/sms_delivery
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
