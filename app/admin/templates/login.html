<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Вход — SMS Delivery</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 360px; margin: 4rem auto; padding: 0 1rem; }
    input { width: 100%; padding: .5rem; margin: .25rem 0 .75rem; box-sizing: border-box; }
    button { padding: .5rem 1rem; }
    .error { color: #b00020; }
  </style>
</head>
<body>
  <h1>SMS Delivery</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    <label>Логин<input name="username" required></label>
    <label>Пароль<input name="password" type="password" required></label>
    <button type="submit">Войти</button>
  </form>
</body>
</html>
